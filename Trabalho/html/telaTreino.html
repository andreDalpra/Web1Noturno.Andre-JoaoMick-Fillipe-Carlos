<section class="conteudo-treino">
    <h2>Infos</h2>

    <div class="body-treinos">
        <button id="addBtn" class="btn">Adicionar</button>

        <table id="tabelaTreinos">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Grupo Muscular</th>
                    <th>Séries</th>
                    <th>Repetições</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>




        <!-- MODAL -->
        <div id="modal" class="modal-treino">

            <div class="modal-content">

                <h3>Treino</h3>

                <input type="text" id="nome" placeholder="Nome do treino">

                <input type="text" id="grupo" placeholder="Grupo muscular">

                <input type="number" id="series" placeholder="Séries">

                <input type="number" id="reps" placeholder="Repetições">

                <button id="salvar" class="btn">Salvar</button>
                <button id="cancelar" class="btn">Cancelar</button>

            </div>
        </div>
    </div>
</section>
