<section class="conteudo-treino">
    <div class="info">
        <h3>
            Olá, <span id="nomeUsuario"></span>! Aqui estão seus treinos cadastrados:
        </h3>
    </div>

    <div class="md2-table-card">
        <div class="md2-table-header" id="toolbarPadraoTreinos">
            <h3>Treinos cadastrados</h3>
            <div class="md2-table-actions">
                <button type="button" class="md2-icon-button" title="Filtrar">
                    <span class="material-symbols-outlined">filter_list</span>
                </button>
                <button type="button" class="md2-icon-button" title="Colunas">
                    <span class="material-symbols-outlined">view_column</span>
                </button>
                <button type="button" class="md2-icon-button" title="Mais opcoes">
                    <span class="material-symbols-outlined">more_vert</span>
                </button>
                <button type="button" class="md3-button-filled" onclick="adicionarTreino()">
                    Adicionar treino
                </button>
            </div>
        </div>

        <div class="md2-table-container">
            <table id="tabelaTreinos" class="md2-data-table">
                <thead>
                    <tr>
                        <th class="col-check">
                            <input type="checkbox" id="CKtreinos" aria-label="Selecionar todos" onclick="selecionarTodosTreinos()">
                        </th>
                        <th class="col-status">Status</th>
                        <th class="col-nome">
                            <button type="button" class="md2-sort-header md2-sort-active" onclick="mudarOrdenacao(this)">
                                Nome
                                <span class="material-symbols-outlined">arrow_downward</span>
                            </button>
                        </th>
                        <th class="col-grupo">
                            <button type="button" class="md2-sort-header" onclick="mudarOrdenacao(this)">
                                Grupo muscular
                                <span class="material-symbols-outlined">arrow_downward</span>
                            </button>
                        </th>
                        <th class="numeric col-series">
                            <button type="button" class="md2-sort-header md2-sort-right" onclick="mudarOrdenacao(this)">
                                Series
                                <span class="material-symbols-outlined">arrow_downward</span>
                            </button>
                        </th>
                        <th class="numeric col-reps">
                            <button type="button" class="md2-sort-header md2-sort-right" onclick="mudarOrdenacao(this)">
                                Repeticoes
                                <span class="material-symbols-outlined">arrow_downward</span>
                            </button>
                        </th>
                        <th class="col-acoes">Acoes</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>
        </div>

        <div class="md2-table-footer">
            <div class="md2-rows-per-page">
                <span>Linhas por pagina:</span>
                <select aria-label="Linhas por pagina">
                    <option selected>5</option>
                    <option>10</option>
                    <option>25</option>
                </select>
            </div>
            <span id="infoPaginacao">0-0 de 0</span>
            <div class="md2-pagination-actions">
                <button type="button" title="Pagina anterior">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <button type="button" title="Proxima pagina">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal-treino">

        <div class="modal-content">

            <button type="button" class="close-modal" onclick="fechaModal()">×</button>

            <h3>Treino</h3>

            <div class="input-group">
                <input type="text" id="EDnome" placeholder=" ">
                <label for="EDnome">Nome do treino</label>
                <span class="error-icon">!</span>
                <small class="error-text"></small>
            </div>

            <div class="input-group">
                <select id="EDgrupo">
                    <option value="">Selecione</option>
                    <option value="Peito">Peito</option>
                    <option value="Costas">Costas</option>
                    <option value="Ombros">Ombros</option>
                    <option value="Biceps">Biceps</option>
                    <option value="Triceps">Triceps</option>
                    <option value="Pernas">Pernas</option>
                    <option value="Gluteos">Gluteos</option>
                    <option value="Abdomen">Abdomen</option>
                    <option value="Cardio">Cardio</option>
                    <option value="Corpo inteiro">Corpo inteiro</option>
                </select>
                <label for="EDgrupo">Grupo muscular</label>
                <span class="error-icon">!</span>
                <small class="error-text"></small>
            </div>

            <div class="input-group">
                <input type="number" id="EDserie" placeholder=" ">
                <label for="EDserie">Series</label>
                <span class="error-icon">!</span>
                <small class="error-text"></small>
            </div>

            <div class="input-group">
                <input type="number" id="EDreps" placeholder=" ">
                <label for="EDreps">Repeticoes</label>
                <span class="error-icon">!</span>
                <small class="error-text"></small>
            </div>

            <div class="acoes-modal">
                <button type="button" id="limparTreino" class="btn btn-limpar" onclick="limparCampos()">Limpar</button>
                <button type="button" id="salvar" class="btn" onclick="salvarTreino()">Salvar</button>
            </div>


        </div>
    </div>
</section>
